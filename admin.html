<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — Barbara Beauty</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F0EB;
      --card: #FFFFFF;
      --border: #E5DDD3;
      --border-strong: #D4C9B8;
      --black: #1A1A1A;
      --gold: #B8956A;
      --gold-dark: #9A7B55;
      --gold-light: #D4BC9A;
      --muted: #8A8278;
      --danger: #D44A4A;
      --success: #4A9A6A;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; }
    a { color: var(--gold-dark); text-decoration: none; }

    /* ── LOGIN ── */
    .login-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--black);
      display: flex; align-items: center; justify-content: center;
    }
    .login-overlay.hidden { display: none; }
    .login-box {
      background: var(--card); border-radius: 24px; padding: 48px;
      width: 400px; max-width: calc(100vw - 32px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; text-align: center; margin-bottom: 4px;
      letter-spacing: 0.05em;
    }
    .login-brand em { font-style: italic; color: var(--gold); }
    .login-sub {
      text-align: center; font-size: 0.78rem; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 28px;
    }
    .login-input {
      width: 100%; padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: 12px; font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; margin-top: 16px; padding: 14px;
      background: var(--gold); color: white; border: none;
      border-radius: 12px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .login-btn:hover { background: var(--gold-dark); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-error {
      color: var(--danger); font-size: 0.82rem;
      margin-top: 14px; text-align: center; display: none;
    }
    .login-error.show { display: block; }

    /* ── APP ── */
    .app { display: none; }
    .app.visible { display: block; }
    .topbar {
      background: var(--black); color: white;
      padding: 20px 40px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; letter-spacing: 0.05em;
    }
    .topbar-brand em { color: var(--gold-light); font-style: italic; }
    .topbar-actions { display: flex; gap: 12px; align-items: center; }
    .topbar a { color: rgba(255,255,255,0.7); font-size: 0.82rem; }
    .topbar a:hover { color: white; }
    .btn-save {
      padding: 10px 24px; background: var(--gold); color: white;
      border: none; border-radius: 10px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-save:hover { background: var(--gold-dark); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-logout {
      background: transparent; color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px; padding: 9px 16px;
      font-size: 0.78rem; cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    .btn-logout:hover { color: white; border-color: rgba(255,255,255,0.35); }

    .main { max-width: 1000px; margin: 0 auto; padding: 32px 24px 80px; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 400; margin-bottom: 8px;
    }
    .page-title em { font-style: italic; color: var(--gold); }
    .page-sub {
      color: var(--muted); font-size: 0.9rem; line-height: 1.6;
      margin-bottom: 32px;
    }

    /* ── FORMATION CARD ── */
    .formation-item {
      background: var(--card); border-radius: 20px;
      margin-bottom: 20px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .formation-head {
      padding: 20px 28px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
      border-bottom: 1px solid transparent;
      transition: background 0.2s;
    }
    .formation-head:hover { background: rgba(184,149,106,0.04); }
    .formation-item.open .formation-head { border-bottom-color: var(--border); }
    .fh-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 500;
    }
    .fh-title em { font-style: italic; color: var(--gold); }
    .fh-meta {
      font-size: 0.75rem; color: var(--muted);
      letter-spacing: 1px; text-transform: uppercase;
      margin-top: 4px;
    }
    .fh-chevron {
      font-size: 1.4rem; color: var(--muted); transition: transform 0.3s;
    }
    .formation-item.open .fh-chevron { transform: rotate(180deg); }
    .formation-body {
      display: none;
      padding: 28px;
    }
    .formation-item.open .formation-body { display: block; }

    .field { margin-bottom: 18px; }
    .field-label {
      display: block; font-size: 0.7rem; font-weight: 600;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .field-hint {
      font-size: 0.75rem; color: var(--muted); margin-top: 6px;
    }
    .field input, .field textarea, .field select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem; color: var(--black);
      background: white; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--gold); }
    .field textarea { resize: vertical; min-height: 120px; }
    .field-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; margin-bottom: 18px;
    }

    .price-block {
      background: var(--bg); border-radius: 14px;
      padding: 20px; margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    .price-block-title {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--gold-dark);
      margin-bottom: 14px;
    }
    .price-block.vip .price-block-title { color: var(--black); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--black); color: white;
      padding: 14px 24px; border-radius: 12px;
      font-size: 0.85rem; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    @media (max-width: 640px) {
      .field-row { grid-template-columns: 1fr; }
      .topbar { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
      .topbar-actions { width: 100%; justify-content: flex-end; }
      .main { padding: 24px 16px 80px; }
      .formation-head { padding: 16px 20px; }
      .formation-body { padding: 20px; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-overlay" id="loginOverlay">
  <form class="login-box" onsubmit="doLogin(event)">
    <div class="login-brand">BARBARA <em>beauty</em></div>
    <div class="login-sub">Espace administration</div>
    <input id="loginPassword" class="login-input" type="password" placeholder="Mot de passe" autocomplete="current-password" required />
    <button id="loginBtn" class="login-btn" type="submit">Se connecter</button>
    <div id="loginError" class="login-error">Mot de passe incorrect</div>
  </form>
</div>

<!-- ── APP ── -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-brand">BARBARA <em>beauty</em> — admin</div>
    <div class="topbar-actions">
      <a href="/formation" target="_blank">Voir la page</a>
      <button class="btn-save" id="saveBtn" onclick="saveAll()">Enregistrer</button>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="main">
    <h1 class="page-title">Formations <em>et prix</em></h1>
    <p class="page-sub">
      Modifie le contenu et les prix de chaque formation. Clique sur une carte pour l'ouvrir.
      N'oublie pas de cliquer sur <strong>Enregistrer</strong> en haut à droite pour publier tes changements.
    </p>
    <div id="formationsList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let token = localStorage.getItem('bb_admin_token') || '';
let data = { formations: [] };

// ── AUTH ──
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const pw = document.getElementById('loginPassword').value;
  const errDiv = document.getElementById('loginError');

  btn.disabled = true;
  btn.textContent = 'Connexion...';
  errDiv.classList.remove('show');

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    const result = await res.json();
    if (result.success) {
      token = result.token;
      localStorage.setItem('bb_admin_token', token);
      showApp();
    } else {
      errDiv.textContent = result.error || 'Mot de passe incorrect';
      errDiv.classList.add('show');
    }
  } catch (err) {
    errDiv.textContent = 'Erreur de connexion : ' + err.message;
    errDiv.classList.add('show');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}

function logout() {
  token = '';
  localStorage.removeItem('bb_admin_token');
  location.reload();
}

async function showApp() {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  await loadData();
}

// ── DATA ──
async function loadData() {
  try {
    const res = await fetch('/api/formations', { cache: 'no-store' });
    if (!res.ok) throw new Error('Chargement échoué');
    data = await res.json();
    if (!data.formations) data.formations = [];
    renderList();
  } catch (err) {
    toast('Erreur chargement : ' + err.message, 'error');
  }
}

function renderList() {
  const list = document.getElementById('formationsList');
  list.innerHTML = data.formations.map((f, i) => renderCard(f, i)).join('');
}

function escapeAttr(str) {
  if (str == null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function stripHtml(str) {
  return String(str || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
}

function renderCard(f, i) {
  const std = (f.prices && f.prices.standard) || {};
  const vip = (f.prices && f.prices.vip) || null;
  const programText = (f.program || []).join('\n');
  const datesText = (Array.isArray(f.availableDates) ? f.availableDates : []).join('\n');
  const dep = f.deposit || {};
  const hasVip = !!vip;

  return `
    <div class="formation-item" id="fitem-${i}">
      <div class="formation-head" onclick="toggleCard(${i})">
        <div>
          <div class="fh-title">${escapeAttr(stripHtml(f.title))}</div>
          <div class="fh-meta">${escapeAttr(f.level || '')} · ${escapeAttr(std.amount || '')}${hasVip ? ' / VIP ' + escapeAttr(vip.amount || '') : ''}</div>
        </div>
        <div class="fh-chevron">⌄</div>
      </div>
      <div class="formation-body">

        <div class="field-row">
          <div class="field">
            <label class="field-label">Niveau (badge)</label>
            <input type="text" data-field="level" data-i="${i}" value="${escapeAttr(f.level)}" />
          </div>
          <div class="field">
            <label class="field-label">Style du badge</label>
            <select data-field="levelClass" data-i="${i}">
              <option value="" ${f.levelClass === '' ? 'selected' : ''}>Doré (défaut)</option>
              <option value="expert" ${f.levelClass === 'expert' ? 'selected' : ''}>Expert (noir)</option>
              <option value="coaching" ${f.levelClass === 'coaching' ? 'selected' : ''}>Coaching (terracotta)</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label class="field-label">Titre de la carte</label>
          <input type="text" data-field="title" data-i="${i}" value="${escapeAttr(f.title)}" />
          <div class="field-hint">Tu peux utiliser <code>&lt;br&gt;</code> pour un retour à la ligne et <code>&lt;em&gt;italique&lt;/em&gt;</code> pour du texte en italique doré.</div>
        </div>

        <div class="field">
          <label class="field-label">Note (optionnelle, affichée en haut du corps)</label>
          <input type="text" data-field="note" data-i="${i}" value="${escapeAttr(f.note)}" placeholder="Ex : Réservé aux techniciennes formées par CilsJo" />
        </div>

        <div class="field">
          <label class="field-label">Description (optionnelle)</label>
          <textarea data-field="description" data-i="${i}" rows="3">${escapeAttr(f.description || '')}</textarea>
        </div>

        <div class="field">
          <label class="field-label">Titre du programme</label>
          <input type="text" data-field="programTitle" data-i="${i}" value="${escapeAttr(f.programTitle || 'Programme théorie & pratique')}" />
        </div>

        <div class="field">
          <label class="field-label">Programme (une ligne = un point)</label>
          <textarea data-field="program" data-i="${i}" rows="10">${escapeAttr(programText)}</textarea>
        </div>

        <div class="field-row">
          <div class="field">
            <label class="field-label">Durée</label>
            <input type="text" data-field="duration" data-i="${i}" value="${escapeAttr(f.duration)}" placeholder="Ex : 2 jours" />
          </div>
          <div class="field">
            <label class="field-label">Lieu</label>
            <input type="text" data-field="location" data-i="${i}" value="${escapeAttr(f.location)}" />
          </div>
        </div>

        <div class="price-block">
          <div class="price-block-title">Tarif Standard</div>
          <div class="field-row">
            <div class="field">
              <label class="field-label">Prix</label>
              <input type="text" data-field="std.amount" data-i="${i}" value="${escapeAttr(std.amount || '')}" placeholder="599€" />
            </div>
            <div class="field">
              <label class="field-label">Libellé du bouton</label>
              <input type="text" data-field="std.buttonLabel" data-i="${i}" value="${escapeAttr(std.buttonLabel || 'Réserver')}" />
            </div>
          </div>
          <div class="field">
            <label class="field-label">Lien Stripe (Payment Link)</label>
            <input type="url" data-field="std.stripeUrl" data-i="${i}" value="${escapeAttr(std.stripeUrl || '')}" placeholder="https://buy.stripe.com/..." />
          </div>
        </div>

        <div class="price-block vip">
          <div class="price-block-title">Tarif VIP (optionnel)</div>
          <div class="field-hint" style="margin-bottom:12px">Laisse vide si cette formation n'a pas de tarif VIP.</div>
          <div class="field-row">
            <div class="field">
              <label class="field-label">Prix</label>
              <input type="text" data-field="vip.amount" data-i="${i}" value="${escapeAttr(vip ? vip.amount : '')}" placeholder="999€" />
            </div>
            <div class="field">
              <label class="field-label">Libellé du bouton</label>
              <input type="text" data-field="vip.buttonLabel" data-i="${i}" value="${escapeAttr(vip ? vip.buttonLabel : 'Réserver en VIP')}" />
            </div>
          </div>
          <div class="field">
            <label class="field-label">Lien Stripe VIP</label>
            <input type="url" data-field="vip.stripeUrl" data-i="${i}" value="${escapeAttr(vip ? vip.stripeUrl : '')}" placeholder="https://buy.stripe.com/..." />
          </div>
        </div>

        <div class="price-block">
          <div class="price-block-title">Dates disponibles (visibles sur le site)</div>
          <div class="field-hint" style="margin-bottom:12px">Une date par ligne. Tu peux ajouter des notes libres (ex. "22 juin 2025 — COMPLET" ou "6 juillet 2025 (3 places)").</div>
          <div class="field">
            <textarea data-field="availableDates" data-i="${i}" rows="6" placeholder="15 juin 2025&#10;22 juin 2025&#10;6 juillet 2025">${escapeAttr(datesText)}</textarea>
          </div>
        </div>

        <div class="price-block">
          <div class="price-block-title">Acompte (optionnel)</div>
          <div class="field-hint" style="margin-bottom:12px">Payment Link Stripe pour payer un acompte. Laisse vide pour ne pas afficher ce bouton.</div>
          <div class="field-row">
            <div class="field">
              <label class="field-label">Montant</label>
              <input type="text" data-field="deposit.amount" data-i="${i}" value="${escapeAttr(dep.amount || '')}" placeholder="150€" />
            </div>
            <div class="field">
              <label class="field-label">Libellé du bouton</label>
              <input type="text" data-field="deposit.label" data-i="${i}" value="${escapeAttr(dep.label || 'Réserver avec acompte')}" />
            </div>
          </div>
          <div class="field">
            <label class="field-label">Lien Stripe (acompte)</label>
            <input type="url" data-field="deposit.stripeUrl" data-i="${i}" value="${escapeAttr(dep.stripeUrl || '')}" placeholder="https://buy.stripe.com/..." />
          </div>
        </div>

      </div>
    </div>`;
}

function toggleCard(i) {
  document.getElementById('fitem-' + i).classList.toggle('open');
}

function collectFromInputs() {
  document.querySelectorAll('[data-field]').forEach(el => {
    const i = parseInt(el.getAttribute('data-i'), 10);
    const field = el.getAttribute('data-field');
    const f = data.formations[i];
    if (!f) return;
    const value = el.value;

    if (field === 'program') {
      f.program = value.split('\n').map(s => s.trim()).filter(Boolean);
    } else if (field === 'availableDates') {
      f.availableDates = value.split('\n').map(s => s.trim()).filter(Boolean);
    } else if (field.startsWith('std.')) {
      const key = field.split('.')[1];
      if (!f.prices) f.prices = {};
      if (!f.prices.standard) f.prices.standard = {};
      f.prices.standard[key] = value;
    } else if (field.startsWith('vip.')) {
      const key = field.split('.')[1];
      if (!f.prices) f.prices = {};
      if (!f.prices.vip) f.prices.vip = {};
      f.prices.vip[key] = value;
    } else if (field.startsWith('deposit.')) {
      const key = field.split('.')[1];
      if (!f.deposit) f.deposit = {};
      f.deposit[key] = value;
    } else {
      f[field] = value;
    }
  });

  // Nettoie VIP s'il est complètement vide
  data.formations.forEach(f => {
    if (f.prices && f.prices.vip) {
      const v = f.prices.vip;
      if (!v.amount && !v.stripeUrl) {
        delete f.prices.vip;
      }
    }
  });
}

// ── SAVE ──
async function saveAll() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Enregistrement...';

  collectFromInputs();

  try {
    const res = await fetch('/api/formations', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify(data)
    });
    const result = await res.json().catch(() => ({}));
    if (!res.ok || !result.success) {
      if (res.status === 401) {
        toast('Session expirée, reconnecte-toi.', 'error');
        setTimeout(logout, 1500);
        return;
      }
      const detail = result.detail ? ' — ' + result.detail : '';
      console.error('Save error:', res.status, result);
      throw new Error((result.error || 'Erreur') + detail);
    }
    toast('✓ Enregistré ! Les changements sont en ligne.', 'success');
    setTimeout(() => loadData(), 500);
  } catch (err) {
    toast('Erreur : ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Enregistrer';
  }
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (type || '');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.className = 'toast'; }, 3500);
}

// ── INIT ──
if (token) showApp();
</script>

</body>
</html>
